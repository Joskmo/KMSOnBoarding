services:

  nginx:
    image: nginx:1.30.2-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/conf.d/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth
      - content
      - assessment
      - frontend
    networks:
      - kms_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://nginx:80
    networks:
      - kms_internal

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${AUTH_DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS}
    depends_on:
      db_auth:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kms_internal

  content:
    build:
      context: ./services/content
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${CONTENT_DATABASE_URL}
    depends_on:
      db_content:
        condition: service_healthy
    networks:
      - kms_internal

  assessment:
    build:
      context: ./services/assessment
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${ASSESSMENT_DATABASE_URL}
    depends_on:
      db_assessment:
        condition: service_healthy
    networks:
      - kms_internal

  db_auth:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kms_auth
      POSTGRES_USER: kms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_auth_data:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kms_internal

  db_content:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kms_content
      POSTGRES_USER: kms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_content_data:/var/lib/postgresql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kms_internal

  db_assessment:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kms_assessment
      POSTGRES_USER: kms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_assessment_data:/var/lib/postgresql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kms_internal

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    networks:
      - kms_internal

volumes:
  pg_auth_data:
  pg_content_data:
  pg_assessment_data:

networks:
  kms_internal:
    driver: bridge
