services:

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - auth
      - content
      - assessment
      - frontend
    networks:
      - kms_internal

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://kms:${POSTGRES_PASSWORD}@db_auth:5432/kms_auth
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db_auth
      - redis
    networks:
      - kms_internal

  content:
    build:
      context: ./services/content
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://kms:${POSTGRES_PASSWORD}@db_content:5432/kms_content
    depends_on:
      - db_content
    networks:
      - kms_internal

  assessment:
    build:
      context: ./services/assessment
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://kms:${POSTGRES_PASSWORD}@db_assessment:5432/kms_assessment
    depends_on:
      - db_assessment
    networks:
      - kms_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - kms_internal

  db_auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kms_auth
      POSTGRES_USER: kms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_auth_data:/var/lib/postgresql/data
    networks:
      - kms_internal

  db_content:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kms_content
      POSTGRES_USER: kms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_content_data:/var/lib/postgresql/data
    networks:
      - kms_internal

  db_assessment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kms_assessment
      POSTGRES_USER: kms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_assessment_data:/var/lib/postgresql/data
    networks:
      - kms_internal

  redis:
    image: redis:8.6-alpine
    networks:
      - kms_internal

volumes:
  pg_auth_data:
  pg_content_data:
  pg_assessment_data:

networks:
  kms_internal:
    driver: bridge
