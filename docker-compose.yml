services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - API_GATEWAY_URL=${API_GATEWAY_URL:-http://api-gateway}
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - api-gateway
    networks:
      - kms_internal

  api-gateway:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    networks:
      - kms_internal
    depends_on:
      - auth
      - content
      - assessment

  certbot:
    image: certbot/certbot:v3.3.0
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - ./infra/certbot/entrypoint.sh:/entrypoint.sh:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - EMAIL=${EMAIL:-admin@example.com}
    entrypoint: /bin/sh
    command: /entrypoint.sh
    depends_on:
      - frontend
    networks:
      - kms_internal

  migrate-auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://kms:${POSTGRES_PASSWORD}@db_auth:5432/kms_auth
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db_auth:
        condition: service_healthy
    networks:
      - kms_internal

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://kms:${POSTGRES_PASSWORD}@db_auth:5432/kms_auth
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS}
    depends_on:
      migrate-auth:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - kms_internal

  migrate-content:
    build:
      context: ./services/content
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://kms:${POSTGRES_PASSWORD}@db_content:5432/kms_content
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db_content:
        condition: service_healthy
    networks:
      - kms_internal

  content:
    build:
      context: ./services/content
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://kms:${POSTGRES_PASSWORD}@db_content:5432/kms_content
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      migrate-content:
        condition: service_completed_successfully
    networks:
      - kms_internal

  migrate-assessment:
    build:
      context: ./services/assessment
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://kms:${POSTGRES_PASSWORD}@db_assessment:5432/kms_assessment
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db_assessment:
        condition: service_healthy
    networks:
      - kms_internal

  assessment:
    build:
      context: ./services/assessment
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://kms:${POSTGRES_PASSWORD}@db_assessment:5432/kms_assessment
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      migrate-assessment:
        condition: service_completed_successfully
    networks:
      - kms_internal

  db_auth:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kms_auth
      POSTGRES_USER: kms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_auth_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - kms_internal

  db_content:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kms_content
      POSTGRES_USER: kms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_content_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - kms_internal

  db_assessment:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kms_assessment
      POSTGRES_USER: kms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_assessment_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - kms_internal

  redis:
    image: redis:8-alpine
    networks:
      - kms_internal

volumes:
  certbot-data:
  certbot-www:
  pg_auth_data:
  pg_content_data:
  pg_assessment_data:

networks:
  kms_internal:
    driver: bridge
